<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="g1" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#fffbe0"/>
      <stop offset="25%"  stop-color="#ffd700"/>
      <stop offset="65%"  stop-color="#d4980a"/>
      <stop offset="100%" stop-color="#7a5200"/>
    </radialGradient>
    <radialGradient id="g2" cx="38%" cy="32%" r="55%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="96" rx="28" ry="5" fill="rgba(0,0,0,0.25)"/>

  <!-- Ball body -->
  <circle cx="50" cy="50" r="46" fill="url(#g1)"/>

  <!-- Pentagon patches (football pattern) -->
  <g clip-path="url(#clip)" fill="none" stroke="rgba(80,40,0,0.35)" stroke-width="2.2" stroke-linejoin="round">
    <!-- Centre pentagon -->
    <polygon points="50,35 62,43 58,57 42,57 38,43"/>
    <!-- Lines radiating from each vertex -->
    <line x1="50" y1="35" x2="50" y2="18"/>
    <line x1="62" y1="43" x2="76" y2="37"/>
    <line x1="58" y1="57" x2="66" y2="70"/>
    <line x1="42" y1="57" x2="34" y2="70"/>
    <line x1="38" y1="43" x2="24" y2="37"/>
    <!-- Outer pentagons (partial) -->
    <polygon points="50,18 60,12 68,20 63,30 37,30 32,20 40,12"/>
    <polygon points="76,37 86,32 92,42 87,52 73,50 66,42"/>
    <polygon points="66,70 74,64 84,68 84,80 68,84 60,76"/>
    <polygon points="34,70 40,76 32,84 16,80 16,68 26,64"/>
    <polygon points="24,37 27,50 13,52 8,42 14,32 24,37"/>
  </g>

  <!-- Shine -->
  <circle cx="50" cy="50" r="46" fill="url(#g2)"/>

  <!-- Rim -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#b8860b" stroke-width="2"/>
</svg>
